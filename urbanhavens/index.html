<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive layout -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Primary metadata -->
    <title>UrbanHavens | Verified Houses and Hostels in Ghana</title>

    <meta
      name="description"
      content="Discover verified houses, hostels, apartments, and rental properties across Accra, Kumasi, and other locations in Ghana with UrbanHavens."
    />

    <meta
      name="keywords"
      content="UrbanHavens, houses for rent Ghana, hostels in Ghana, apartments in Accra, rentals in Kumasi, student hostels, verified properties Ghana"
    />

    <meta name="author" content="UrbanHavens" />

    <meta name="robots" content="index, follow" />

    <meta name="theme-color" content="#071a10" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/URBANHAVENSLOGO.png"
    />

    <link
      rel="apple-touch-icon"
      href="/URBANHAVENSLOGO.png"
    />

    <!-- Open Graph metadata -->
    <meta
      property="og:title"
      content="UrbanHavens | Find Your Perfect Home"
    />

    <meta
      property="og:description"
      content="Browse verified houses, hostels, and apartments across Ghana."
    />

    <meta property="og:type" content="website" />

    <meta
      property="og:url"
      content="https://urbanhavensgh.vercel.app"
    />

    <meta
      property="og:image"
      content="https://urbanhavensgh.vercel.app/URBANHAVENSLOGO.png"
    />

    <meta property="og:site_name" content="UrbanHavens" />

    <!-- Twitter/X metadata -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="UrbanHavens | Find Your Perfect Home"
    />

    <meta
      name="twitter:description"
      content="Discover verified rental properties, houses, hostels, and apartments across Ghana."
    />

    <meta
      name="twitter:image"
      content="https://urbanhavensgh.vercel.app/URBANHAVENSLOGO.png"
    />
  </head>

    <div id="root"></div>

    <script

</html>
