<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Makes the page display correctly on mobile devices. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Standard browser title. -->
    <title>{{ property_name }} | UrbanHavens</title>

    <!-- Open Graph metadata used by WhatsApp, Facebook, LinkedIn, and Telegram. -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="UrbanHavens">
    <meta property="og:title" content="{{ property_name }}">
    <meta property="og:description" content="{{ share_description }}">
    <meta property="og:image" content="{{ property_image }}">
    <meta property="og:image:secure_url" content="{{ property_image }}">
    <meta property="og:image:alt" content="{{ property_name }}">
    <meta property="og:url" content="{{ share_url }}">

    <!-- Twitter/X metadata for a large image preview. -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ property_name }}">
    <meta name="twitter:description" content="{{ share_description }}">
    <meta name="twitter:image" content="{{ property_image }}">

    <!-- Sends normal visitors to the actual React property-details page. -->
    <meta http-equiv="refresh" content="1;url={{ detail_url }}">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f5f7f6;
            color: #1f2937;
        }

        .share-page {
            width: min(90%, 420px);
            padding: 32px;
            text-align: center;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
        }

        .share-page img {
            width: 100%;
            max-height: 230px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 18px;
        }

        .share-page h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        .share-page p {
            margin: 0 0 18px;
            line-height: 1.6;
            color: #4b5563;
        }

        .share-page a {
            color: #166534;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <main class="share-page">
        {% if property_image %}
            <img
                src="{{ property_image }}"
                alt="{{ property_name }}"
            >
        {% endif %}

        <h1>{{ property_name }}</h1>

        <p>{{ share_description }}</p>

        <p>Opening the property page...</p>

        <a href="{{ detail_url }}">
            View property on UrbanHavens
        </a>
    </main>
</body>
</html>
